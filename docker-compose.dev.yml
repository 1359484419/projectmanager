services:
  postgres:
    image: postgres:16-alpine
    container_name: pm-dev-postgres
    environment:
      POSTGRES_DB: pm
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: pm
    ports:
      - "5432:5432"
    volumes:
      - pm_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pm -d pm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pm_dev_pgdata:
